services:
  postgres:
    image: postgres:16-alpine
    container_name: hillsideoasis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hillsideoasis
      POSTGRES_USER: hillsideoasis
      POSTGRES_PASSWORD: hillsideoasis
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

  adminer:
    image: adminer:4
    container_name: hillsideoasis-adminer
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8081:8080"

volumes:
  postgres_data:
